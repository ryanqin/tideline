<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — learnings</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header>
    <h1>Tideline</h1>
    <nav>
      <a href="/">Translate</a>
      <a href="/learnings" class="active">Learnings</a>
    </nav>
  </header>

  <main>
    <p class="hint" style="margin-top:0;margin-bottom:2rem;">
      What's quietly come together so far. Promote a repeated candidate into a
      review card — each card keeps the stack of moments it grew from.
    </p>

    <h3 class="section-title">Your review deck — cards</h3>
    <div id="cards"></div>

    <div class="section-head">
      <h3 class="section-title">Clusters</h3>
      <div class="toggle" id="cluster-toggle" role="tablist" aria-label="Cluster grouping">
        <button type="button" data-view="concept" class="active" role="tab" aria-selected="true">By concept</button>
        <button type="button" data-view="language" role="tab" aria-selected="false">By language</button>
      </div>
    </div>
    <div id="clusters"></div>

    <h3 class="section-title">Candidates — repeated translations</h3>
    <div id="candidates"></div>
  </main>

  <script>
    const LANG_SHORT = {
      Japanese: '日', English: '英', Chinese: '中', French: '法',
      Spanish: '西', German: '德', Italian: '意', Korean: '韩',
    };
    let NATIVE_LANG = 'Chinese';  // overwritten by /api/identity

    function shortLang(name) {
      return LANG_SHORT[name] || escape(name || '?');
    }
    // (gloss, src→tgt) — e.g. "(拉面, 日→英)". The native gloss only shows when the
    // target isn't already your first language (no point repeating it there).
    function annot(src, tgt, gloss) {
      const dir = `${shortLang(src)}→${shortLang(tgt)}`;
      // Gloss only helps when neither side is already your first language.
      const showGloss = gloss && tgt !== NATIVE_LANG && src !== NATIVE_LANG;
      return `<span class="langtag">(${showGloss ? escape(gloss) + ', ' : ''}${dir})</span>`;
    }
    // Inline gloss for the by-language view (the bucket header already carries
    // the direction). Same first-language suppression as annot().
    function glossSuffix(src, tgt, gloss) {
      const show = gloss && tgt !== NATIVE_LANG && src !== NATIVE_LANG;
      return show ? ' (' + escape(gloss) + ')' : '';
    }

    async function loadCards() {
      const target = document.getElementById('cards');
      try {
        const r = await fetch('/api/cards');
        const data = await r.json();
        if (!data.length) {
          target.innerHTML = '<div class="empty">No cards yet — cards surface on their own once concepts cluster; you keep the ones worth keeping and sink the rest.</div>';
          return;
        }
        target.innerHTML = data.map(c => `
          <div class="cluster">
            <h2>${escape(c.original)} → ${escape(c.translated)} ${annot(c.source_lang, c.target_lang, c.native_gloss)}</h2>
            <div class="members">
              ${c.moments.map(m => `
                <div class="member">
                  <span class="original">${escape(m.source || 'text')}</span>
                  <span class="translated">${escape(m.at || '')}</span>
                  <span class="context">${m.context ? escape(m.context) : '— no context captured —'}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (e) {
        target.innerHTML = `<div class="empty">Couldn't load cards: ${escape(String(e))}</div>`;
      }
    }

    async function loadClusters() {
      const target = document.getElementById('clusters');
      try {
        const r = await fetch('/api/clusters');
        const data = await r.json();
        if (!data.length) {
          target.innerHTML = '<div class="empty">No clusters yet. Keep translating and they\'ll surface on their own.</div>';
          return;
        }
        target.innerHTML = data.map(c => `
          <div class="cluster">
            <h2>${escape(c.title || `Cluster #${c.id}`)}</h2>
            <div class="members">
              ${c.members.map(m => `
                <div class="member">
                  <span class="original">${shortLang(m.source_lang)} ${escape(m.original)}</span>
                  <span class="translated">${escape(m.translated)}${m.native_gloss ? ' (' + escape(m.native_gloss) + ')' : ''}</span>
                  ${m.context ? `<span class="context">${escape(m.context)}</span>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (e) {
        target.innerHTML = `<div class="empty">Couldn't load clusters: ${escape(String(e))}</div>`;
      }
    }

    async function loadClustersByLanguage() {
      const target = document.getElementById('clusters');
      try {
        const r = await fetch('/api/clusters/by-language');
        const data = await r.json();
        if (!data.length) {
          target.innerHTML = '<div class="empty">No learnings yet — once translations repeat, they group by source language here.</div>';
          return;
        }
        target.innerHTML = data.map(g => `
          <div class="cluster">
            <h2>${escape(g.lang)} <span class="count">${g.total}×</span></h2>
            <div class="members">
              ${g.members.map(m => `
                <div class="member">
                  <span class="original">${escape(m.original)} → ${escape(m.translated)}${glossSuffix(m.source_lang, m.target_lang, m.native_gloss)}</span>
                  <span class="count">${m.count}×</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
      } catch (e) {
        target.innerHTML = `<div class="empty">Couldn't load language groups: ${escape(String(e))}</div>`;
      }
    }

    function setupClusterToggle() {
      const toggle = document.getElementById('cluster-toggle');
      if (!toggle) return;
      toggle.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-view]');
        if (!btn) return;
        toggle.querySelectorAll('button').forEach(b => {
          const on = b === btn;
          b.classList.toggle('active', on);
          b.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        if (btn.dataset.view === 'language') loadClustersByLanguage();
        else loadClusters();
      });
    }

    async function loadCandidates() {
      const target = document.getElementById('candidates');
      try {
        const r = await fetch('/api/candidates');
        const data = await r.json();
        if (!data.length) {
          target.innerHTML = '<div class="empty">No candidates yet.</div>';
          return;
        }
        target.innerHTML = data.map(c => `
          <div class="candidate">
            <span>${escape(c.original)} → ${escape(c.translated)}</span>
            ${annot(c.source_lang, c.target_lang, c.native_gloss)}
            <span class="count">${c.count}×</span>
          </div>
        `).join('');
      } catch (e) {
        target.innerHTML = `<div class="empty">Couldn't load candidates: ${escape(String(e))}</div>`;
      }
    }

    function escape(s) {
      return String(s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[ch]);
    }

    async function init() {
      try {
        const r = await fetch('/api/identity');
        const id = await r.json();
        if (id && id.native_lang) NATIVE_LANG = id.native_lang;
      } catch (e) { /* keep default */ }
      setupClusterToggle();
      loadCards();
      loadClusters();
      loadCandidates();
    }
    init();
  </script>
</body>
</html>
