<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — museum</title>
  <link rel="stylesheet" href="/static/styles.css?v=__ASSET_V__">
  <script src="/static/i18n.js?v=__ASSET_V__"></script>
  <script src="/static/shore.js?v=__ASSET_V__"></script>
  <script src="/static/sheet.js?v=__ASSET_V__"></script>
</head>
<body class="museum-page">
  <header>
    <h1>Tideline</h1>
    <!-- The desk is the hub (DESIGN §10.7): the way out of the museum is back
         down to the water's edge. It returns you to WHERE YOU CAME FROM — the
         desk (/) by default, but the OPEN shore (/?shore=open) if you walked up
         here from the shore (carried as ?from=shore). Static href="/" is the
         no-JS / desk-origin default; the script below upgrades it for a shore
         arrival, so a wade → museum → back round-trip doesn't strand you on the
         desk with your shore closed. -->
    <a class="back-to-shore" href="/">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      <span data-i18n="back_to_shore">Water's edge</span>
    </a>
    <div class="identity">
      <span class="picker">
      <label for="native-lang" data-i18n="first_lang_label">Your first language</label>
      <select id="native-lang">
        <option value="Chinese" data-i18n="lang_Chinese">Chinese</option>
        <option value="English" data-i18n="lang_English">English</option>
        <option value="Japanese" data-i18n="lang_Japanese">Japanese</option>
        <option value="French" data-i18n="lang_French">French</option>
        <option value="Spanish" data-i18n="lang_Spanish">Spanish</option>
        <option value="German" data-i18n="lang_German">German</option>
        <option value="Italian" data-i18n="lang_Italian">Italian</option>
        <option value="Korean" data-i18n="lang_Korean">Korean</option>
      </select>
      </span>
      <!-- Interface language: its own setting (multilingual UI). Options stay in
           their own script (not data-i18n'd). -->
      <span class="picker">
      <label for="ui-locale" data-i18n="ui_lang_label">Interface</label>
      <select id="ui-locale" class="ui-locale">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      </span>
    </div>
  </header>

  <main class="museum">
    <p class="hint museum-hint" data-i18n="museum_hint">
      Everything that's washed up, shelved on the dunes. Browse it by card,
      concept, language, or theme — tap a shell to open what it holds.
    </p>

    <!-- The lenses (DESIGN §10.7): the same collection, shelved four ways. -->
    <div class="lens" id="lens" role="tablist" aria-label="Museum lenses">
      <button type="button" data-lens="cards" class="active" role="tab" aria-selected="true" data-i18n="lens_cards">Cards</button>
      <button type="button" data-lens="concept" role="tab" aria-selected="false" data-i18n="lens_concept">Concept</button>
      <button type="button" data-lens="language" role="tab" aria-selected="false" data-i18n="lens_language">Language</button>
      <button type="button" data-lens="theme" role="tab" aria-selected="false" data-i18n="lens_theme">Theme</button>
    </div>

    <!-- The active lens's shelves render here (the list / a11y floor). -->
    <div id="shelves" class="shelves"></div>

    <!-- Still forming: the repeated translations that haven't matured into a
         card yet — the substrate under the shelves, shown plainly. -->
    <h3 class="section-title museum-forming" data-i18n="museum_forming">Still forming</h3>
    <div id="candidates"></div>
  </main>

  <div class="shoreline" aria-hidden="true">
    <svg viewBox="0 0 720 26"><path d="M0 14 Q 45 6 90 14 T 180 14 T 270 14 T 360 14 T 450 14 T 540 14 T 630 14 T 720 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>

  <script>
    // Language names come from i18n's locale-aware langShort / langName (one
    // source of truth, shared with sheet.js) — no per-file LANG_SHORT copy.
    let NATIVE_LANG = 'Chinese';  // overwritten by /api/identity
    let LENS = 'cards';           // the open shelf

    // Return to where you came from: a shore arrival (?from=shore) goes back to
    // the OPEN shore, not the desk, so a wade → museum → back round-trip lands
    // you on the water you were exploring. Desk arrivals keep the plain href.
    if (new URLSearchParams(location.search).get('from') === 'shore') {
      document.querySelector('.back-to-shore')?.setAttribute('href', '/?shore=open');
    }

    function escape(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[ch]);
    }
    const annot = (src, tgt) => `<span class="langtag">(${langShort(src)}→${langShort(tgt)})</span>`;

    // One shell on a shelf: the warm line glyph (shared with the shore via
    // Shore.glyph) + its first-language label, as a real focusable button
    // (DESIGN §10.7 — every shell is a labelled control, the museum's doorway
    // into the same card / recall flow). The data rides on the element so a tap
    // opens it with no refetch.
    function shellButton(item) {
      return `
        <button type="button" class="shelf-shell kind-${item.kind}" data-key="${escape(item.key)}"
                aria-label="${escape(item.label)}">
          <span class="shelf-glyph">${Shore.glyph(item.kind, item.key)}</span>
          <span class="shelf-cap">${escape(item.label)}</span>
        </button>`;
    }

    // A shelf: an optional label (the language groups name their shelves) over a
    // row of shells. Shells wrap freely, each resting on its own soft sand mark.
    function shelf(items, label) {
      const head = label ? `<div class="shelf-label">${label}</div>` : '';
      return `<section class="shelf">${head}<div class="shelf-row">${items.map(shellButton).join('')}</div></section>`;
    }

    function emptyShelf(key) {
      return `<div class="empty">${escape(t(key))}</div>`;
    }

    // Each lens keeps the data it drew, keyed by the shell's data-key, so a tap
    // re-opens it without a refetch (mirrors the shore).
    let SHELF_DATA = {};

    async function getJSON(url) {
      try { const r = await fetch(url); return r.ok ? await r.json() : []; }
      catch (e) { return []; }
    }

    // cards → sea-glass: the full deck (the museum holds all of it; the shore
    // only the calm few). Tap opens the card + its moments; sink sends it back.
    async function lensCards() {
      const cards = await getJSON('/api/cards');
      SHELF_DATA = {};
      if (!cards.length) return emptyShelf('cards_empty');
      const items = cards
        .filter(c => c.translated && c.translated.trim())
        .map(c => {
          const key = 'card-' + c.id;
          SHELF_DATA[key] = { kind: 'glass', data: c };
          return { kind: 'glass', key, label: c.translated };
        });
      return shelf(items);
    }

    // concept → scallop shells: synonym clusters. Tap opens the synonyms.
    async function lensConcept() {
      const concepts = await getJSON('/api/clusters');
      SHELF_DATA = {};
      const named = concepts.filter(c => c.title && c.title.trim());
      if (!named.length) return emptyShelf('clusters_empty');
      const items = named.map(c => {
        const key = 'concept-' + c.id;
        SHELF_DATA[key] = { kind: 'shell', data: c };
        return { kind: 'shell', key, label: c.title };
      });
      return shelf(items);
    }

    // theme → crabs: remembered scenes. Tap opens album-style masked recall.
    async function lensTheme() {
      const themes = await getJSON('/api/themes');
      SHELF_DATA = {};
      const named = themes.filter(c => c.title && c.title.trim());
      if (!named.length) return emptyShelf('themes_empty');
      const items = named.map(c => {
        const key = 'theme-' + c.id;
        SHELF_DATA[key] = { kind: 'crab', data: c };
        return { kind: 'crab', key, label: c.title };
      });
      return shelf(items);
    }

    // language → one shelf per source language, sea-glass for each term. These
    // are the emergent vocabulary (candidates), not full cards. The tile shows
    // the FOREIGN word itself (not its translation), so this lens answers "what
    // have I met in each language" — and same-meaning synonyms stay distinct
    // tiles instead of collapsing into a duplicate of the shared translation
    // (中華そば and ラーメン both mean 拉面 but are two different words met).
    // A tap opens a read-only glass (the word, the direction, how often met).
    async function lensLanguage() {
      const groups = await getJSON('/api/clusters/by-language');
      SHELF_DATA = {};
      if (!groups.length) return emptyShelf('by_language_empty');
      return groups.map(g => {
        const items = g.members.map((m, i) => {
          const key = 'lang-' + escape(g.lang) + '-' + i;
          SHELF_DATA[key] = { kind: 'glass', data: {
            original: m.original, translated: m.translated, count: m.count,
            source_lang: m.source_lang, target_lang: m.target_lang, readonly: true,
          } };
          return { kind: 'glass', key, label: m.original };
        });
        const label = `${escape(langName(g.lang))} <span class="count">${g.total}×</span>`;
        return shelf(items, label);
      }).join('');
    }

    const LENS_LOADERS = {
      cards: lensCards, concept: lensConcept, language: lensLanguage, theme: lensTheme,
    };

    async function renderLens() {
      const host = document.getElementById('shelves');
      host.setAttribute('aria-busy', 'true');
      host.innerHTML = await (LENS_LOADERS[LENS] || lensCards)();
      host.setAttribute('aria-busy', 'false');
    }

    // Tap a shell → the shared sheet rises with what it holds (same flow as the
    // shore). A sunk card slips back under the sea; drop it + re-render.
    function setupShelfTaps() {
      const host = document.getElementById('shelves');
      host.addEventListener('click', (e) => {
        const btn = e.target.closest('.shelf-shell');
        if (!btn) return;
        const entry = SHELF_DATA[btn.dataset.key];
        if (!entry) return;
        Sheet.open(entry.kind, entry.data, {
          onSink: () => renderLens(),
        });
      });
    }

    function setupLens() {
      const lens = document.getElementById('lens');
      lens.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-lens]');
        if (!btn || btn.dataset.lens === LENS) return;
        lens.querySelectorAll('button').forEach(b => {
          const on = b === btn;
          b.classList.toggle('active', on);
          b.setAttribute('aria-selected', on ? 'true' : 'false');
        });
        LENS = btn.dataset.lens;
        renderLens();
      });
    }

    async function loadCandidates() {
      const target = document.getElementById('candidates');
      const data = await getJSON('/api/candidates');
      if (!data.length) {
        target.innerHTML = `<div class="empty">${escape(t('candidates_empty'))}</div>`;
        return;
      }
      target.innerHTML = data.map(c => `
        <div class="candidate">
          <span>${escape(c.original)} → ${escape(c.translated)}</span>
          ${annot(c.source_lang, c.target_lang)}
          <span class="count">${c.count}×</span>
        </div>
      `).join('');
    }

    // Everything that depends on the first language: the active lens (labels +
    // direction tags) and the forming list. Keeps whichever lens is open.
    function refreshMuseum() {
      renderLens();
      loadCandidates();
    }

    function init() {
      setupLens();
      setupShelfTaps();
      // The shared header picker loads the language, localizes the chrome, and
      // re-renders the museum on load + on every first-language change.
      setupIdentityPicker((lang) => {
        NATIVE_LANG = lang;
        document.title = t('title_museum');
        refreshMuseum();
      });
    }
    init();
  </script>
</body>
</html>
