<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — the shore</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    /* Slice-1 preview chrome only — the real shore (DESIGN §10) mounts the same
       engine into the translate page in slice 2; this scrubber is a dev handle. */
    html, body { height: 100%; margin: 0; }
    .shore-scene { position: fixed; inset: 0; overflow: hidden; background: #0c1230; }
    .shore-scene svg { width: 100%; height: 100%; display: block; }

    .shore-dev {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 0.9rem;
      padding: 0.6rem 1.1rem; border-radius: 999px;
      background: rgba(20, 22, 38, 0.42); backdrop-filter: blur(10px) saturate(1.2);
      color: #fff; font-family: var(--sans); font-size: 0.82rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28); border: 1px solid rgba(255, 255, 255, 0.14);
      max-width: calc(100vw - 32px);
    }
    .shore-dev input[type=range] { width: 200px; accent-color: #e8a35a; }
    .shore-dev .readout { font-variant-numeric: tabular-nums; white-space: nowrap; opacity: 0.92; }
    .shore-dev .readout b { font-weight: 600; }
    .shore-dev .label { opacity: 0.7; letter-spacing: 0.02em; }

    .shore-caption {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.82); font-family: var(--serif); font-size: 1.05rem;
      text-shadow: 0 1px 8px rgba(0,0,0,0.35); letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="shore-scene" id="scene" aria-live="polite"></div>
  <div class="shore-caption">Tideline — the shore (slice 1: the empty, living coast)</div>

  <div class="shore-dev" role="group" aria-label="Time scrubber (dev)">
    <span class="label">time</span>
    <input id="hour" type="range" min="0" max="24" step="0.25" aria-label="hour of day">
    <span class="readout" id="readout"></span>
  </div>

  <script src="/static/shore.js"></script>
  <script>
    const scene = document.getElementById('scene');
    const slider = document.getElementById('hour');
    const readout = document.getElementById('readout');

    // Start from the device clock (or a ?h=/?t= override), then let the slider
    // walk the shore through the day — the manual scrub of DESIGN §10.6.
    const start = Shore.resolveDate();
    slider.value = start.getHours() + start.getMinutes() / 60;
    const baseDay = new Date(start);

    function draw(hour) {
      const d = new Date(baseDay);
      d.setHours(Math.floor(hour), Math.round((hour % 1) * 60), 0, 0);
      const st = Shore.render(scene, { date: d });
      const ph = st.phase;
      const phaseName = ph.illum < 0.04 ? 'new' : ph.illum > 0.96 ? 'full'
        : (ph.waxing ? 'waxing ' : 'waning ') + (ph.illum < 0.5 ? 'crescent' : 'gibbous');
      const tidePct = Math.round(st.tide * 100);
      const rising = Shore.tideAt(new Date(d.getTime() + 6e5)) > st.tide;
      readout.innerHTML =
        `<b>${Shore.labelTime(hour)}</b> &middot; tide ${tidePct}% ${rising ? '↑' : '↓'} &middot; moon ${Math.round(ph.illum*100)}% ${phaseName}`;
    }

    slider.addEventListener('input', () => draw(parseFloat(slider.value)));
    draw(parseFloat(slider.value));
    addEventListener('resize', () => draw(parseFloat(slider.value)));
  </script>
</body>
</html>
