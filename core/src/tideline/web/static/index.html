<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — translate</title>
  <link rel="stylesheet" href="/static/styles.css?v=__ASSET_V__">
  <script src="/static/i18n.js?v=__ASSET_V__"></script>
  <script src="/static/shore.js?v=__ASSET_V__"></script>
  <script src="/static/sheet.js?v=__ASSET_V__"></script>
</head>
<body class="has-coastline">
  <header>
    <h1>Tideline</h1>
    <!-- The desk is the hub (DESIGN §10.7, 2026-06-03): the shore is one swipe
         up AND the shelves are one tap here, so both your learnings views are
         reachable from home — not the museum buried behind the shore. -->
    <a class="to-museum" href="/learnings" data-i18n-title="to_shelves_aria"
       title="去沙丘上的陈列馆">
      <span data-i18n="nav_museum">Museum</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
    </a>
    <div class="identity">
      <span class="picker">
      <label for="native-lang" data-i18n="first_lang_label">Your first language</label>
      <select id="native-lang">
        <option value="Chinese" data-i18n="lang_Chinese">Chinese</option>
        <option value="English" data-i18n="lang_English">English</option>
        <option value="Japanese" data-i18n="lang_Japanese">Japanese</option>
        <option value="French" data-i18n="lang_French">French</option>
        <option value="Spanish" data-i18n="lang_Spanish">Spanish</option>
        <option value="German" data-i18n="lang_German">German</option>
        <option value="Italian" data-i18n="lang_Italian">Italian</option>
        <option value="Korean" data-i18n="lang_Korean">Korean</option>
      </select>
      </span>
      <!-- Interface language: its own setting (multilingual UI). Options stay in
           their own script — a language switcher names each language in itself,
           so they are NOT data-i18n'd. -->
      <span class="picker">
      <label for="ui-locale" data-i18n="ui_lang_label">Interface</label>
      <select id="ui-locale" class="ui-locale">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      </span>
    </div>
  </header>

  <main>
    <section class="translator">
      <label for="text" data-i18n="translate_q">What do you want to translate?</label>
      <textarea id="text" rows="4" data-i18n-placeholder="translate_ph" placeholder="Type text, paste a menu line, drop in a phrase..."></textarea>

      <div class="row">
        <span class="target-note"><span data-i18n="into_first">Into your first language</span><span id="native-name"></span></span>
        <button id="go" data-i18n="btn_translate">Translate</button>
      </div>

      <output id="result" aria-live="polite"></output>
    </section>

    <p class="hint" data-i18n-html="index_hint">
      Everything you translate is stored locally. After enough translations
      pile up, wade into the shore — or head to the
      <a href="/learnings">shelves</a> — to see the clusters that have quietly
      formed in the background.
    </p>
  </main>

  <div class="coastline" id="coastline" aria-hidden="true"></div>

  <!-- Swipe up (or click) to wade from the desk into the full shore (DESIGN §10.2). -->
  <button class="shore-handle" id="shoreOpen" type="button" aria-label="Wade into the shore"
          aria-expanded="false" aria-controls="shoreFull">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
  </button>

  <!-- The full shore. Hidden until you wade in; in here the translator steps
       back to a corner (slice 2b). Shells wash up here in slice 3. -->
  <div class="shore-full" id="shoreFull" aria-hidden="true" role="region" aria-label="The shore">
    <div class="shore-scene-host" id="shoreScene"></div>
    <div class="shore-creatures" id="shoreCreatures"></div>

    <!-- Tap a creature to open what washed ashore: a card's lived moments or a
         theme's masked recall. The warm sheet itself is owned by sheet.js
         (shared with the museum), injected on first open. -->

    <button class="shore-back" id="shoreBack" type="button" aria-label="Back to the desk">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <!-- Walk back up the beach to the shelves on the dunes — the full
         collection (DESIGN §10.7). The museum is reached *from the shore*, not
         as a sibling tab; this doorway is that path. A real link (works without
         JS, carries link semantics); the spatial walk-back lives in its title. -->
    <a class="shore-museum" id="toMuseum" href="/learnings?from=shore"
       data-i18n-title="to_shelves_aria" title="沿沙滩走回沙丘上的货架">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
      <span data-i18n="nav_museum">Museum</span>
    </a>

    <button class="shore-compose" id="shoreCompose" type="button" data-i18n="btn_translate">Translate</button>
  </div>

  <script>
    const textEl = document.getElementById('text');
    const goEl = document.getElementById('go');
    const resultEl = document.getElementById('result');
    const nativeNameEl = document.getElementById('native-name');

    async function translate() {
      const text = textEl.value.trim();
      if (!text) return;
      goEl.disabled = true;
      resultEl.textContent = '…';
      try {
        const r = await fetch('/api/translate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text}),
        });
        if (!r.ok) {
          resultEl.textContent = `error: ${r.status}`;
        } else {
          const data = await r.json();
          resultEl.textContent = data.translated;
        }
      } catch (e) {
        resultEl.textContent = `error: ${e}`;
      } finally {
        goEl.disabled = false;
      }
    }

    goEl.addEventListener('click', translate);
    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) translate();
    });

    // First language now lives in the shared header picker — localize on load
    // and whenever it changes (it also moves the translation target).
    setupIdentityPicker((lang) => {
      document.title = t('title_translate');
      nativeNameEl.textContent = ' — ' + t('lang_' + lang);
    });

    // The living coastline at the foot of the desk (DESIGN §10.2): tide + time
    // driven, repainted on resize and refreshed gently so it stays current
    // across a long sitting. Slice 2b turns this strip into the swipe-up edge.
    const coastlineEl = document.getElementById('coastline');
    function paintCoast() { if (window.Shore && coastlineEl) Shore.renderStrip(coastlineEl); }
    paintCoast();
    addEventListener('resize', paintCoast);
    setInterval(paintCoast, 60000);

    // --- wade in: collapse the desk, open the full shore (DESIGN §10.2) ------
    const body = document.body;
    const shoreFull = document.getElementById('shoreFull');
    const shoreScene = document.getElementById('shoreScene');
    const shoreCreatures = document.getElementById('shoreCreatures');
    const shoreOpen = document.getElementById('shoreOpen');
    const isOpen = () => body.classList.contains('shore-open');

    // Slice 3b — the tide brings real learnings ashore. Two relations, one
    // visual language (DESIGN §10.5): a theme → a crab, a single card →
    // sea-glass. Every label is the FIRST-language form, never the source (the
    // Tideline rule): a card shows its `translated`, a theme shows its `title`
    // (named in the first language by episodic_title). shore.js only draws;
    // this page owns the data — the load-bearing split stays in engineering.
    let CREATURES = [];                  // what the tide last left ashore
    // Every shell you haven't opened yet glows; opening one puts its glint out.
    // Session-scoped (resets when you next walk down to the water) — a gentle
    // "you haven't looked at these" cue, never a stored unread count.
    const OPENED = new Set();             // creature ids you've already opened

    async function gatherCreatures() {
      const get = (u) => fetch(u).then((r) => (r.ok ? r.json() : [])).catch(() => []);
      const [cards, themes] = await Promise.all([
        get('/api/cards'), get('/api/themes'),
      ]);
      const named = (rows) => rows.filter((r) => r.title && r.title.trim());
      // Among DUE review units the tide brings the *weakest* memories first
      // (lowest strength box), so a word/scene you keep getting right yields its
      // scarce slot to one you're still shaky on (DESIGN §10.3). The /api decks
      // are recency-ordered for the museum's whole-deck view; the shore re-sorts
      // by the spaced-repetition box here, without disturbing that. Cards and
      // themes share this rhythm — one helper, one source of truth.
      const dueWeakestFirst = (rows) =>
        rows.filter((r) => r.due).sort((a, b) => (a.strength | 0) - (b.strength | 0));

      // Themes are a review unit: only DUE scenes wash ashore (a scene you just
      // recalled rests until its interval elapses). Opening a crab on the shore
      // offers masked recall + a self-grade (sheet.js).
      const crabs = dueWeakestFirst(named(themes))
        .map((t) => ({ id: 'theme-' + t.id, kind: 'crab', label: t.title, data: t }));
      // Cards wash ashore when due; the label is the FOREIGN word — the shown
      // question (review direction = translation direction, §3.3). Labelling
      // by translation would hand out the masked answer before the card even
      // opens. Still drop cards without a translation (nothing to reach for).
      const glass = dueWeakestFirst(cards.filter((c) => c.translated && c.translated.trim()))
        .map((c) => ({ id: 'card-' + c.id, kind: 'glass', label: c.original, data: c }));
      // Only a calm few wash up — never a wall; that restraint is what fixes the
      // deck overload (DESIGN §10.5). Due cards (the review work) get a
      // guaranteed share so consolidation never starves behind the due scenes
      // (crabs); the rest fills with those scenes. The exact rhythm of the mix
      // is a later polish pass.
      // Fewer ashore on a narrow phone — wider columns give each name room to
      // breathe (the calm-few rule, tuned to the screen).
      const CALM = (window.innerWidth || 1024) < 480 ? 3 : 5;
      const cardSlots = Math.min(glass.length, Math.max(1, Math.floor(CALM / 2)));
      const structure = crabs.slice(0, CALM - cardSlots);
      return [...glass.slice(0, cardSlots), ...structure];
    }

    function paintShore() {
      if (!window.Shore) return;
      if (shoreScene) Shore.render(shoreScene);
      // Glow marks the unopened: every shell you haven't tapped yet catches the
      // glint; the ones you've opened rest quiet. Recomputed each paint, so an
      // open (which adds to OPENED + repaints) puts that shell's glint out.
      CREATURES.forEach((c) => { c.glow = !OPENED.has(c.id); });
      if (shoreCreatures) Shore.renderCreatures(shoreCreatures, CREATURES);
    }

    // Re-read the tide, then repaint. Fail-soft: a fetch hiccup keeps whatever
    // was last ashore rather than emptying the beach.
    async function tideRefresh() {
      try { CREATURES = await gatherCreatures(); } catch (e) { /* keep last ashore */ }
      if (isOpen()) paintShore();
    }
    // Warm the tide on load so the first wade-in isn't an empty beach.
    tideRefresh();

    function openShore() {
      if (isOpen()) return;
      // Set the open STATE first, before any rendering. The museum's
      // "back to the shore" link lands on /?shore=open and trusts this to open
      // the shore — so a hiccup in paintShore() must never be able to throw
      // before the class is set and leave you stranded on the desk.
      body.classList.add('shore-open');
      shoreFull.setAttribute('aria-hidden', 'false');
      shoreOpen.setAttribute('aria-expanded', 'true');
      paintShore();         // show whatever the tide already holds — no empty flash
      tideRefresh();        // then re-read, in case it changed since last time
    }
    function closeShore() {
      if (!isOpen()) return;
      Sheet.close();   // a creature sheet never outlives the shore it sits in
      body.classList.remove('shore-open');
      shoreFull.setAttribute('aria-hidden', 'true');
      shoreOpen.setAttribute('aria-expanded', 'false');
    }
    shoreOpen.addEventListener('click', openShore);
    document.getElementById('shoreBack').addEventListener('click', closeShore);
    // The corner translator: step back to the desk, ready to cast another word.
    document.getElementById('shoreCompose').addEventListener('click', () => {
      closeShore();
      textEl.focus();
    });
    // Escape backs out one layer at a time: an open creature sheet first,
    // then the shore itself.
    addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (Sheet.isOpen()) Sheet.close();
      else closeShore();
    });
    addEventListener('resize', () => { if (isOpen()) paintShore(); });
    setInterval(() => { if (isOpen()) paintShore(); }, 60000);

    // Touch parity: swipe up from the lower edge wades in; swipe down on the
    // shore steps back. Augments the chevrons (which carry desktop + a11y).
    // Suppressed mid shell-drag so flinging a shell never reads as a wade.
    let swipeY = null, suppressSwipe = false;
    addEventListener('pointerdown', (e) => { swipeY = e.clientY; });
    addEventListener('pointerup', (e) => {
      if (suppressSwipe) { suppressSwipe = false; swipeY = null; return; }
      if (swipeY == null) return;
      const dy = e.clientY - swipeY;
      swipeY = null;
      if (Sheet.isOpen()) return;  // the sheet owns the gesture
      if (!isOpen() && dy < -60 && e.clientY > innerHeight * 0.6) openShore();
      else if (isOpen() && dy > 80) closeShore();
    });

    // --- a creature: tap to open, or drag up into the sea to sink it ---------
    // Tap a shell / crab / glass → the shared warm sheet (sheet.js) rises with
    // what it holds. DRAG one up over the surf, into the open water, and let go
    // → it sinks back into the sediment (DESIGN §10.4/§10.5: the sea above is
    // the resting layer; flinging a card up there lets it rest). Only cards
    // sink; a theme eases back — the water won't take a scene. The sheet's
    // "沉底" button stays as the keyboard / screen-reader path.
    const SEA_LINE = () => innerHeight * 0.5;   // above this you're over the water
    const isSinkable = (cr) => !!cr && cr.kind === 'glass' && cr.data
      && cr.data.id != null && !cr.data.readonly;
    const reduceMotion = () => matchMedia('(prefers-reduced-motion: reduce)').matches;

    let drag = null, suppressClick = false;

    shoreCreatures.addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('.shore-shell');
      if (!btn) return;
      const cr = CREATURES.find((c) => c.id === btn.dataset.id);
      if (!cr) return;
      suppressClick = false;
      drag = { btn, cr, x0: e.clientX, y0: e.clientY, pid: e.pointerId, moved: false };
      try { btn.setPointerCapture(e.pointerId); } catch (_) {}
    });

    shoreCreatures.addEventListener('pointermove', (e) => {
      if (!drag || e.pointerId !== drag.pid) return;
      const dx = e.clientX - drag.x0, dy = e.clientY - drag.y0;
      if (!drag.moved && Math.hypot(dx, dy) > 8) {
        drag.moved = true;
        drag.btn.style.zIndex = '5';     // lift above its neighbours while held
        drag.btn.classList.add('held');
      }
      if (!drag.moved) return;
      drag.btn.style.transition = 'none';
      drag.btn.style.transform =
        `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) rotate(var(--rot,0deg))`;
      // hint the water is ready to take it once it's up over the surf
      drag.btn.classList.toggle('over-sea', e.clientY < SEA_LINE() && isSinkable(drag.cr));
    });

    function endDrag(e) {
      if (!drag || e.pointerId !== drag.pid) return;
      const d = drag; drag = null;
      try { d.btn.releasePointerCapture(d.pid); } catch (_) {}
      d.btn.classList.remove('over-sea');
      if (!d.moved) return;            // a tap — let the click handler open it
      suppressClick = true;            // a real drag — don't also open the sheet
      suppressSwipe = true;            // ...and don't read it as a wade gesture
      if (e.clientY < SEA_LINE() && isSinkable(d.cr)) sinkToSea(d.cr, d.btn, e.clientX, e.clientY);
      else easeHome(d.btn);            // the water didn't take it — float back
    }
    shoreCreatures.addEventListener('pointerup', endDrag);
    shoreCreatures.addEventListener('pointercancel', endDrag);

    function easeHome(btn) {
      btn.classList.remove('held');
      btn.style.transition = '';
      btn.style.transform = '';
      btn.style.zIndex = '';
    }

    // Sink it: a ripple where it meets the water, the shell settles under, then
    // it leaves the tide for good (POST /api/cards/sink) and the beach repaints.
    function sinkToSea(cr, btn, x, y) {
      const finish = () => {
        CREATURES = CREATURES.filter((c) => c !== cr);
        fetch('/api/cards/sink', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ card_id: cr.data.id }),
        }).catch(() => {});
        paintShore();
      };
      if (reduceMotion()) { finish(); return; }
      spawnRipple(x, y);
      btn.classList.remove('held');
      btn.style.transition = 'transform 0.5s ease-in, opacity 0.45s ease-in';
      btn.style.transform = 'translate(-50%, calc(-50% + 34px)) rotate(var(--rot,0deg)) scale(0.62)';
      btn.style.opacity = '0';
      setTimeout(finish, 460);
    }

    // a soft ring spreading on the water surface — an ellipse, seen at an angle
    function spawnRipple(x, y) {
      const r = document.createElement('div');
      r.className = 'sea-ripple';
      r.style.left = x + 'px';
      r.style.top = y + 'px';
      shoreCreatures.appendChild(r);
      setTimeout(() => r.remove(), 750);
    }

    shoreCreatures.addEventListener('click', (e) => {
      if (suppressClick) { suppressClick = false; return; }  // that was a drag
      const btn = e.target.closest('.shore-shell');
      if (!btn) return;
      const cr = CREATURES.find((c) => c.id === btn.dataset.id);
      if (!cr) return;
      // You've now looked at this one — put its glint out (repaint so the shell
      // behind the sheet is already quiet when you close it).
      OPENED.add(cr.id);
      paintShore();
      Sheet.open(cr.kind, cr.data, {
        // A due card opened on the shore is a review: you recall the word and
        // self-grade (sheet.js POSTs the outcome). The schedule reschedules it,
        // so it's no longer due — drop it from this tide + repaint.
        review: true,
        onReview: (card) => {
          CREATURES = CREATURES.filter((c) => c.data !== card);
          paintShore();
        },
        // a sunk card slips back under the sea — drop it from the tide + repaint.
        onSink: (card) => {
          CREATURES = CREATURES.filter((c) => c.data !== card);
          paintShore();
        },
      });
    });

    // ?shore=open — open on load, for demo + screenshots.
    if (new URLSearchParams(location.search).get('shore') === 'open') openShore();
  </script>
</body>
</html>
