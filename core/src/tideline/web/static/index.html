<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — translate</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/i18n.js"></script>
  <script src="/static/shore.js"></script>
  <script src="/static/sheet.js"></script>
</head>
<body class="has-coastline">
  <header>
    <h1>Tideline</h1>
    <!-- One world, not two tabs (DESIGN §10.2/§10.7): the desk is the front
         door, the shore is one swipe up, and the museum is reached from the
         shore. So the header carries no flat Translate/Museum nav — just the
         brand and the "me" anchor. -->
    <div class="identity">
      <label for="native-lang" data-i18n="first_lang_label">Your first language</label>
      <select id="native-lang">
        <option value="Chinese" data-i18n="lang_Chinese">Chinese</option>
        <option value="English" data-i18n="lang_English">English</option>
        <option value="Japanese" data-i18n="lang_Japanese">Japanese</option>
        <option value="French" data-i18n="lang_French">French</option>
        <option value="Spanish" data-i18n="lang_Spanish">Spanish</option>
        <option value="German" data-i18n="lang_German">German</option>
        <option value="Italian" data-i18n="lang_Italian">Italian</option>
        <option value="Korean" data-i18n="lang_Korean">Korean</option>
      </select>
    </div>
  </header>

  <main>
    <section class="translator">
      <label for="text" data-i18n="translate_q">What do you want to translate?</label>
      <textarea id="text" rows="4" data-i18n-placeholder="translate_ph" placeholder="Type text, paste a menu line, drop in a phrase..."></textarea>

      <div class="row">
        <span class="target-note"><span data-i18n="into_first">Into your first language</span><span id="native-name"></span></span>
        <button id="go" data-i18n="btn_translate">Translate</button>
      </div>

      <output id="result" aria-live="polite"></output>
    </section>

    <p class="hint" data-i18n-html="index_hint">
      Everything you translate is stored locally. After enough translations
      pile up, wade into the shore — or head to the
      <a href="/learnings">shelves</a> — to see the clusters that have quietly
      formed in the background.
    </p>
  </main>

  <div class="coastline" id="coastline" aria-hidden="true"></div>

  <!-- Swipe up (or click) to wade from the desk into the full shore (DESIGN §10.2). -->
  <button class="shore-handle" id="shoreOpen" type="button" aria-label="去海岸"
          aria-expanded="false" aria-controls="shoreFull">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
  </button>

  <!-- The full shore. Hidden until you wade in; in here the translator steps
       back to a corner (slice 2b). Shells wash up here in slice 3. -->
  <div class="shore-full" id="shoreFull" aria-hidden="true" role="region" aria-label="海岸">
    <div class="shore-scene-host" id="shoreScene"></div>
    <div class="shore-creatures" id="shoreCreatures"></div>

    <!-- Tap a creature to open what washed ashore: a card's lived moments, a
         concept's synonyms, or a theme's masked recall. The warm sheet itself
         is owned by sheet.js (shared with the museum), injected on first open. -->

    <button class="shore-back" id="shoreBack" type="button" aria-label="回到桌前">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <!-- Walk back up the beach to the shelves on the dunes — the full
         collection (DESIGN §10.7). The museum is reached *from the shore*, not
         as a sibling tab; this doorway is that path. A real link (works without
         JS, carries link semantics); the spatial walk-back lives in its title. -->
    <a class="shore-museum" id="toMuseum" href="/learnings"
       data-i18n-title="to_shelves_aria" title="沿沙滩走回沙丘上的货架">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h16"/></svg>
      <span data-i18n="nav_museum">Museum</span>
    </a>

    <button class="shore-compose" id="shoreCompose" type="button" data-i18n="btn_translate">Translate</button>
  </div>

  <script>
    const textEl = document.getElementById('text');
    const goEl = document.getElementById('go');
    const resultEl = document.getElementById('result');
    const nativeNameEl = document.getElementById('native-name');

    async function translate() {
      const text = textEl.value.trim();
      if (!text) return;
      goEl.disabled = true;
      resultEl.textContent = '…';
      try {
        const r = await fetch('/api/translate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text}),
        });
        if (!r.ok) {
          resultEl.textContent = `error: ${r.status}`;
        } else {
          const data = await r.json();
          resultEl.textContent = data.translated;
        }
      } catch (e) {
        resultEl.textContent = `error: ${e}`;
      } finally {
        goEl.disabled = false;
      }
    }

    goEl.addEventListener('click', translate);
    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) translate();
    });

    // First language now lives in the shared header picker — localize on load
    // and whenever it changes (it also moves the translation target).
    setupIdentityPicker((lang) => {
      document.title = t('title_translate');
      nativeNameEl.textContent = ' — ' + t('lang_' + lang);
    });

    // The living coastline at the foot of the desk (DESIGN §10.2): tide + time
    // driven, repainted on resize and refreshed gently so it stays current
    // across a long sitting. Slice 2b turns this strip into the swipe-up edge.
    const coastlineEl = document.getElementById('coastline');
    function paintCoast() { if (window.Shore && coastlineEl) Shore.renderStrip(coastlineEl); }
    paintCoast();
    addEventListener('resize', paintCoast);
    setInterval(paintCoast, 60000);

    // --- wade in: collapse the desk, open the full shore (DESIGN §10.2) ------
    const body = document.body;
    const shoreFull = document.getElementById('shoreFull');
    const shoreScene = document.getElementById('shoreScene');
    const shoreCreatures = document.getElementById('shoreCreatures');
    const shoreOpen = document.getElementById('shoreOpen');
    const isOpen = () => body.classList.contains('shore-open');

    // Slice 3b — the tide brings real learnings ashore. Three relations, one
    // visual language (DESIGN §10.5): a concept cluster → a shell, a theme →
    // a crab, a single card → sea-glass. Every label is the FIRST-language
    // form, never the source (the Tideline rule): a card shows its `translated`,
    // a cluster shows its `title` (named in the first language by
    // episodic_title). shore.js only draws; this page owns the data — the
    // load-bearing split stays in engineering.
    let CREATURES = [];                  // what the tide last left ashore

    async function gatherCreatures() {
      const get = (u) => fetch(u).then((r) => (r.ok ? r.json() : [])).catch(() => []);
      const [cards, concepts, themes] = await Promise.all([
        get('/api/cards'), get('/api/clusters'), get('/api/themes'),
      ]);
      const named = (rows) => rows.filter((r) => r.title && r.title.trim());
      const shells = named(concepts).map((c) => ({ id: 'concept-' + c.id, kind: 'shell', label: c.title, data: c }));
      const crabs  = named(themes).map((t) => ({ id: 'theme-' + t.id, kind: 'crab', label: t.title, data: t }));
      // /api/cards is newest-first; the label is the translation into your
      // language. Drop any without one — nothing to read on that glass.
      const glass = cards
        .filter((c) => c.translated && c.translated.trim())
        .map((c) => ({ id: 'card-' + c.id, kind: 'glass', label: c.translated, data: c }));
      // Only a calm few wash up — never a wall; that restraint is what fixes the
      // deck overload (DESIGN §10.5). The matured shells/crabs come first, then
      // the freshest cards fill up to the cap. (slice-3b: "freshest" = newest
      // arrivals; the real maturation rhythm lands later.)
      // Fewer ashore on a narrow phone — wider columns give each name room to
      // breathe (the calm-few rule, tuned to the screen).
      const CALM = (window.innerWidth || 1024) < 480 ? 3 : 5;
      const matured = [...crabs, ...shells].slice(0, CALM);
      const fill = glass.slice(0, Math.max(0, CALM - matured.length));
      if (fill[0]) fill[0].fresh = true;  // the newest arrival catches the glint
      return [...matured, ...fill];
    }

    function paintShore() {
      if (!window.Shore) return;
      if (shoreScene) Shore.render(shoreScene);
      if (shoreCreatures) Shore.renderCreatures(shoreCreatures, CREATURES);
    }

    // Re-read the tide, then repaint. Fail-soft: a fetch hiccup keeps whatever
    // was last ashore rather than emptying the beach.
    async function tideRefresh() {
      try { CREATURES = await gatherCreatures(); } catch (e) { /* keep last ashore */ }
      if (isOpen()) paintShore();
    }
    // Warm the tide on load so the first wade-in isn't an empty beach.
    tideRefresh();

    function openShore() {
      if (isOpen()) return;
      paintShore();         // show whatever the tide already holds — no empty flash
      tideRefresh();        // then re-read, in case it changed since last time
      body.classList.add('shore-open');
      shoreFull.setAttribute('aria-hidden', 'false');
      shoreOpen.setAttribute('aria-expanded', 'true');
    }
    function closeShore() {
      if (!isOpen()) return;
      Sheet.close();   // a creature sheet never outlives the shore it sits in
      body.classList.remove('shore-open');
      shoreFull.setAttribute('aria-hidden', 'true');
      shoreOpen.setAttribute('aria-expanded', 'false');
    }
    shoreOpen.addEventListener('click', openShore);
    document.getElementById('shoreBack').addEventListener('click', closeShore);
    // The corner translator: step back to the desk, ready to cast another word.
    document.getElementById('shoreCompose').addEventListener('click', () => {
      closeShore();
      textEl.focus();
    });
    // Escape backs out one layer at a time: an open creature sheet first,
    // then the shore itself.
    addEventListener('keydown', (e) => {
      if (e.key !== 'Escape') return;
      if (Sheet.isOpen()) Sheet.close();
      else closeShore();
    });
    addEventListener('resize', () => { if (isOpen()) paintShore(); });
    setInterval(() => { if (isOpen()) paintShore(); }, 60000);

    // Touch parity: swipe up from the lower edge wades in; swipe down on the
    // shore steps back. Augments the chevrons (which carry desktop + a11y).
    let swipeY = null;
    addEventListener('pointerdown', (e) => { swipeY = e.clientY; });
    addEventListener('pointerup', (e) => {
      if (swipeY == null) return;
      const dy = e.clientY - swipeY;
      swipeY = null;
      if (Sheet.isOpen()) return;  // the sheet owns the gesture
      if (!isOpen() && dy < -60 && e.clientY > innerHeight * 0.6) openShore();
      else if (isOpen() && dy > 80) closeShore();
    });

    // --- a creature, opened -------------------------------------------------
    // Tap a shell / crab / glass and the shared warm sheet (sheet.js) rises with
    // what it holds — a card's moments, a concept's synonyms, a theme's masked
    // recall. The same sheet serves the museum, so the two surfaces stay one
    // visual language. Data rides on each creature (gathered with it), so
    // opening one needs no refetch.
    shoreCreatures.addEventListener('click', (e) => {
      const btn = e.target.closest('.shore-shell');
      if (!btn) return;
      const cr = CREATURES.find((c) => c.id === btn.dataset.id);
      if (!cr) return;
      Sheet.open(cr.kind, cr.data, {
        // a sunk card slips back under the sea — drop it from the tide + repaint.
        onSink: (card) => {
          CREATURES = CREATURES.filter((c) => c.data !== card);
          paintShore();
        },
      });
    });

    // ?shore=open — open on load, for demo + screenshots.
    if (new URLSearchParams(location.search).get('shore') === 'open') openShore();
  </script>
</body>
</html>
