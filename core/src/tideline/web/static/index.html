<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tideline — translate</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/i18n.js"></script>
  <script src="/static/shore.js"></script>
</head>
<body class="has-coastline">
  <header>
    <h1>Tideline</h1>
    <nav>
      <a href="/" class="active" data-i18n="nav_translate">Translate</a>
      <a href="/learnings" data-i18n="nav_learnings">Learnings</a>
    </nav>
    <div class="identity">
      <label for="native-lang" data-i18n="first_lang_label">Your first language</label>
      <select id="native-lang">
        <option value="Chinese" data-i18n="lang_Chinese">Chinese</option>
        <option value="English" data-i18n="lang_English">English</option>
        <option value="Japanese" data-i18n="lang_Japanese">Japanese</option>
        <option value="French" data-i18n="lang_French">French</option>
        <option value="Spanish" data-i18n="lang_Spanish">Spanish</option>
        <option value="German" data-i18n="lang_German">German</option>
        <option value="Italian" data-i18n="lang_Italian">Italian</option>
        <option value="Korean" data-i18n="lang_Korean">Korean</option>
      </select>
    </div>
  </header>

  <main>
    <section class="translator">
      <label for="text" data-i18n="translate_q">What do you want to translate?</label>
      <textarea id="text" rows="4" data-i18n-placeholder="translate_ph" placeholder="Type text, paste a menu line, drop in a phrase..."></textarea>

      <div class="row">
        <span class="target-note"><span data-i18n="into_first">Into your first language</span><span id="native-name"></span></span>
        <button id="go" data-i18n="btn_translate">Translate</button>
      </div>

      <output id="result" aria-live="polite"></output>
    </section>

    <p class="hint" data-i18n-html="index_hint">
      Everything you translate is stored locally. After enough translations
      pile up, head to <a href="/learnings">Learnings</a> to see the clusters
      that have quietly formed in the background.
    </p>
  </main>

  <div class="coastline" id="coastline" aria-hidden="true"></div>

  <!-- Swipe up (or click) to wade from the desk into the full shore (DESIGN §10.2). -->
  <button class="shore-handle" id="shoreOpen" type="button" aria-label="去海岸"
          aria-expanded="false" aria-controls="shoreFull">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15l6-6 6 6"/></svg>
  </button>

  <!-- The full shore. Hidden until you wade in; in here the translator steps
       back to a corner (slice 2b). Shells wash up here in slice 3. -->
  <div class="shore-full" id="shoreFull" aria-hidden="true" role="region" aria-label="海岸">
    <div class="shore-scene-host" id="shoreScene"></div>
    <div class="shore-creatures" id="shoreCreatures"></div>
    <button class="shore-back" id="shoreBack" type="button" aria-label="回到桌前">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <button class="shore-compose" id="shoreCompose" type="button" data-i18n="btn_translate">Translate</button>
  </div>

  <script>
    const textEl = document.getElementById('text');
    const goEl = document.getElementById('go');
    const resultEl = document.getElementById('result');
    const nativeNameEl = document.getElementById('native-name');

    async function translate() {
      const text = textEl.value.trim();
      if (!text) return;
      goEl.disabled = true;
      resultEl.textContent = '…';
      try {
        const r = await fetch('/api/translate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text}),
        });
        if (!r.ok) {
          resultEl.textContent = `error: ${r.status}`;
        } else {
          const data = await r.json();
          resultEl.textContent = data.translated;
        }
      } catch (e) {
        resultEl.textContent = `error: ${e}`;
      } finally {
        goEl.disabled = false;
      }
    }

    goEl.addEventListener('click', translate);
    textEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) translate();
    });

    // First language now lives in the shared header picker — localize on load
    // and whenever it changes (it also moves the translation target).
    setupIdentityPicker((lang) => {
      document.title = t('title_translate');
      nativeNameEl.textContent = ' — ' + t('lang_' + lang);
    });

    // The living coastline at the foot of the desk (DESIGN §10.2): tide + time
    // driven, repainted on resize and refreshed gently so it stays current
    // across a long sitting. Slice 2b turns this strip into the swipe-up edge.
    const coastlineEl = document.getElementById('coastline');
    function paintCoast() { if (window.Shore && coastlineEl) Shore.renderStrip(coastlineEl); }
    paintCoast();
    addEventListener('resize', paintCoast);
    setInterval(paintCoast, 60000);

    // --- wade in: collapse the desk, open the full shore (DESIGN §10.2) ------
    const body = document.body;
    const shoreFull = document.getElementById('shoreFull');
    const shoreScene = document.getElementById('shoreScene');
    const shoreCreatures = document.getElementById('shoreCreatures');
    const shoreOpen = document.getElementById('shoreOpen');
    const isOpen = () => body.classList.contains('shore-open');

    // Slice 3a — a hand-set sample so the creature look can be judged before
    // wiring real data (/api/clusters concepts → shells, /api/themes → crabs,
    // /api/cards → sea-glass). The tide brings only a calm few.
    //
    // Labels are in the user's FIRST language, never the source — that is the
    // Tideline rule (translate into your language only). When this is wired in
    // slice 3b: a card → its `translated`; a concept/theme cluster → its
    // `title` — which must itself be generated in the first language (today
    // episodic_title is English-cued, so that needs fixing before 3b).
    const SAMPLE_CREATURES = [
      { id: 'c1', kind: 'shell', label: '谢谢', fresh: true },
      { id: 'c2', kind: 'glass', label: '营业时间' },
      { id: 'c3', kind: 'crab',  label: '东京的午饭' },
      { id: 'c4', kind: 'shell', label: '好吃' },
      { id: 'c5', kind: 'glass', label: '担担面' },
    ];
    function paintShore() {
      if (!window.Shore) return;
      if (shoreScene) Shore.render(shoreScene);
      if (shoreCreatures) Shore.renderCreatures(shoreCreatures, SAMPLE_CREATURES);
    }
    function openShore() {
      if (isOpen()) return;
      paintShore();
      body.classList.add('shore-open');
      shoreFull.setAttribute('aria-hidden', 'false');
      shoreOpen.setAttribute('aria-expanded', 'true');
    }
    function closeShore() {
      if (!isOpen()) return;
      body.classList.remove('shore-open');
      shoreFull.setAttribute('aria-hidden', 'true');
      shoreOpen.setAttribute('aria-expanded', 'false');
    }
    shoreOpen.addEventListener('click', openShore);
    document.getElementById('shoreBack').addEventListener('click', closeShore);
    // The corner translator: step back to the desk, ready to cast another word.
    document.getElementById('shoreCompose').addEventListener('click', () => {
      closeShore();
      textEl.focus();
    });
    addEventListener('keydown', (e) => { if (e.key === 'Escape') closeShore(); });
    addEventListener('resize', () => { if (isOpen()) paintShore(); });
    setInterval(() => { if (isOpen()) paintShore(); }, 60000);

    // Touch parity: swipe up from the lower edge wades in; swipe down on the
    // shore steps back. Augments the chevrons (which carry desktop + a11y).
    let swipeY = null;
    addEventListener('pointerdown', (e) => { swipeY = e.clientY; });
    addEventListener('pointerup', (e) => {
      if (swipeY == null) return;
      const dy = e.clientY - swipeY;
      swipeY = null;
      if (!isOpen() && dy < -60 && e.clientY > innerHeight * 0.6) openShore();
      else if (isOpen() && dy > 80) closeShore();
    });

    // ?shore=open — open on load, for demo + screenshots.
    if (new URLSearchParams(location.search).get('shore') === 'open') openShore();
  </script>
</body>
</html>
